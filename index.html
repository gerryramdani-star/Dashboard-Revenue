<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Revenue Lagikreatif</title>
    
    <!-- 1. Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- 2. Import Babel untuk membaca sintaks React (JSX) di browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    
    <!-- Tempat Aplikasi React akan dirender -->
    <div id="root"></div>

    <!-- 3. Kode Utama Aplikasi React -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { 
          LayoutDashboard, DollarSign, Filter, Bell, Sun, Moon, Download, 
          ChevronRight, BarChart2, Users, Target, Activity, Map, UserCheck, 
          Briefcase, Menu, X, ArrowUpRight, ArrowDownRight, MoreVertical, Search, Edit3, Check, Calendar, AlertCircle, Info
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- INITIAL DATA (Dikosongkan agar murni dari GSheets) ---
        const initialRevenueData = { current: 0, target: 120000000, activeClients: 0, targetNew: 3, renewalRate: 90, healthScore: 80, forecast: 85000000 };
        const initialClients = [];
        const initialStrategicRevenue = [];
        const initialProjectRevenue = [];

        const initialFunnelData = [
          { stage: 'Prospect', count: 100, conv: '100%', target: 120, gap: -20 },
          { stage: 'Executive Meeting', count: 20, conv: '20%', target: 25, gap: -5 },
          { stage: 'Discovery', count: 15, conv: '75%', target: 20, gap: -5 },
          { stage: 'Opportunity', count: 10, conv: '66%', target: 15, gap: -5 },
          { stage: 'Proposal', count: 7, conv: '70%', target: 10, gap: -3 },
          { stage: 'Negotiation', count: 5, conv: '71%', target: 7, gap: -2 },
          { stage: 'Closing', count: 3, conv: '60%', target: 5, gap: -2 },
        ];
        
        const initialAcquisition = [
          { channel: 'Founder Networking', percentage: 40, leads: 40, meeting: 8, opp: 4, prop: 3, close: 1, rev: 26200000 },
          { channel: 'Referral Program', percentage: 25, leads: 25, meeting: 5, opp: 3, prop: 2, close: 1, rev: 16375000 },
          { channel: 'Government & BUMN', percentage: 20, leads: 20, meeting: 4, opp: 2, prop: 1, close: 1, rev: 13100000 },
          { channel: 'Website & LinkedIn', percentage: 10, leads: 10, meeting: 2, opp: 1, prop: 1, close: 0, rev: 6550000 },
          { channel: 'Strategic Partnership', percentage: 5, leads: 5, meeting: 1, opp: 0, prop: 0, close: 0, rev: 3275000 },
        ];
        
        const initialMarketing = {
          main: { leads: 45, cr: 4.2 },
          platforms: [
            { platform: 'Instagram', reach: '45.2K', visits: '3.1K', click: 420, leads: 15, cr: '3.5%' },
            { platform: 'LinkedIn', reach: '12.5K', visits: '1.2K', click: 350, leads: 18, cr: '5.1%' },
            { platform: 'TikTok', reach: '85.0K', visits: '5.4K', click: 600, leads: 8, cr: '1.3%' },
            { platform: 'Website (SEO)', reach: '10.2K', visits: '4.5K', click: 0, leads: 4, cr: '0.8%' },
          ]
        };
        
        const initialRoadmap = {
          protect: [ { name: 'Renewal Existing Client', value: 90, status: '90%' }, { name: 'Client Health Score >80', value: 75, status: '75%' }, { name: 'Churn Reduction', value: 50, status: 'In Progress' } ],
          optimize: [ { name: 'Upselling Service', value: 30, status: '30%' }, { name: 'Cross Selling', value: 45, status: '45%' }, { name: 'ARPC Growth', value: 15, status: '15%' } ],
          growth: [ { name: 'New Client Acquisition', value: 66, status: '2/3 Target' }, { name: 'Strategic Partnership', value: 20, status: '1 Active' }, { name: 'New Recurring Rev', value: 0, status: 'Not Started' } ]
        };
        
        const initialTeamKpi = {
          ceo: [ { label: 'Exec. Meeting', val: '12 / 20' }, { label: 'Opportunity', val: '6 / 10' }, { label: 'Client Baru', val: '1 / 3' } ],
          cmo: [ { label: 'Pipeline Value', val: 'Rp 240M' }, { label: 'MQLs', val: '45' }, { label: 'Rev Contribution', val: '15%' } ],
          ae: [ { label: 'Proposal Sent', val: '7' }, { label: 'Win Rate', val: '42%' }, { label: 'Closing', val: '3' } ],
          cs: [ { label: 'Renewal Rate', val: '90%' }, { label: 'Upselling', val: 'Rp 15M' }, { label: 'NPS Score', val: '78' } ],
          coo: [ { label: 'On Time Delivery', val: '92%' }, { label: 'Project Completion', val: '85%' }, { label: 'Resource Util.', val: '88%' } ]
        };
        
        const initialFinance = { totalRev: 0, grossProfit: 0, opEx: 0, netProfit: 0, cashPos: 0, ar: 0, ap: 0, burnRate: 0 };

        const formatIDR = (num) => 'Rp' + Number(num).toLocaleString('id-ID');

        // --- UTILITY COMPONENTS ---
        const Card = ({ children, className = "" }) => <div className={`bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-5 ${className}`}>{children}</div>;
        const SectionTitle = ({ title, subtitle }) => <div className="mb-6"><h2 className="text-xl font-bold text-[#0A1F44] dark:text-white">{title}</h2>{subtitle && <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">{subtitle}</p>}</div>;
        const EditableField = ({ isEditing, value, onChange, type = "text", prefix = "", suffix = "", className = "", inputClass = "w-full max-w-[120px]" }) => {
          if (!isEditing) {
            let displayValue = value;
            if (type === 'number') displayValue = Number(value).toLocaleString('id-ID');
            return <span className={className}>{prefix}{displayValue}{suffix}</span>;
          }
          return (
            <div className="flex items-center gap-1">
              {prefix && <span className="text-xs text-slate-500">{prefix}</span>}
              <input type={type} value={value} onChange={(e) => onChange(type === 'number' ? Number(e.target.value) : e.target.value)} className={`bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded px-2 py-0.5 text-sm focus:outline-none focus:ring-1 focus:ring-[#F5A623] dark:text-white ${inputClass}`} />
              {suffix && <span className="text-xs text-slate-500">{suffix}</span>}
            </div>
          );
        };
        const KPICard = ({ title, value, rawValue, isEditing, onValueChange, isCurrency = false, subtitle, icon: Icon, trend, colorClass = "text-[#0A1F44] dark:text-white" }) => (
          <Card>
            <div className="flex justify-between items-start">
              <div className="w-full mr-4">
                <p className="text-sm font-medium text-slate-500 dark:text-slate-400 mb-1">{title}</p>
                {isEditing && onValueChange ? (
                  <input type="number" value={rawValue} onChange={(e) => onValueChange(Number(e.target.value))} className="w-full bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded px-2 py-1 text-lg font-bold text-[#0A1F44] dark:text-white focus:outline-none focus:ring-2 focus:ring-[#F5A623]" />
                ) : (
                  <h3 className={`text-2xl font-bold ${colorClass} truncate`}>{isCurrency ? formatIDR(rawValue) : value}</h3>
                )}
                {subtitle && <p className="text-xs text-slate-400 mt-2">{subtitle}</p>}
              </div>
              <div className={`p-3 rounded-lg flex-shrink-0 ${trend === 'up' ? 'bg-emerald-100 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400' : trend === 'down' ? 'bg-rose-100 text-rose-600 dark:bg-rose-900/30 dark:text-rose-400' : 'bg-[#0A1F44]/10 text-[#0A1F44] dark:bg-slate-700 dark:text-[#F5A623]'}`}>
                <Icon size={20} />
              </div>
            </div>
          </Card>
        );
        const ProgressBar = ({ value, max, label, color = "bg-[#0A1F44]" }) => {
          const percentage = max > 0 ? Math.min(100, Math.max(0, (value / max) * 100)) : 0;
          return (
            <div className="w-full">
              <div className="flex justify-between text-sm mb-1">
                <span className="font-medium dark:text-slate-300">{label}</span>
                <span className="font-bold dark:text-white">{percentage.toFixed(1)}%</span>
              </div>
              <div className="h-2.5 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                <div className={`h-full ${color} rounded-full transition-all duration-500`} style={{ width: `${percentage}%` }}></div>
              </div>
            </div>
          );
        };
        const UploadIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;

        // --- PAGE COMPONENTS ---
        const ExecutiveSummary = ({ data, setData, isEditing }) => {
          const gap = data.target - data.current;
          const updateData = (key, value) => setData(prev => ({ ...prev, [key]: value }));
          return (
            <div className="space-y-6">
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <KPICard title="Total Revenue Bulan Ini" rawValue={data.current} isCurrency isEditing={isEditing} onValueChange={(val) => updateData('current', val)} icon={DollarSign} trend="up" colorClass="text-[#0A1F44] dark:text-white" />
                <KPICard title="Target Revenue" rawValue={data.target} isCurrency isEditing={isEditing} onValueChange={(val) => updateData('target', val)} icon={Target} colorClass="text-[#0A1F44] dark:text-white" />
                <KPICard title="Revenue Gap" rawValue={gap} isCurrency value={formatIDR(gap)} icon={Activity} trend={gap > 0 ? "down" : "up"} colorClass={gap > 0 ? "text-rose-600 dark:text-rose-400" : "text-emerald-600 dark:text-emerald-400"} subtitle={gap <= 0 ? "Target Achieved!" : "Needs action"} />
                <KPICard title="Forecast (90 Hari)" rawValue={data.forecast} isCurrency isEditing={isEditing} onValueChange={(val) => updateData('forecast', val)} icon={BarChart2} trend="up" colorClass="text-emerald-600 dark:text-emerald-400" />
              </div>
              <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                <KPICard title="Active Clients" value={data.activeClients} rawValue={data.activeClients} isEditing={isEditing} onValueChange={(val) => updateData('activeClients', val)} icon={Users} />
                <KPICard title="Target New Client" value={data.targetNew} rawValue={data.targetNew} isEditing={isEditing} onValueChange={(val) => updateData('targetNew', val)} icon={UserCheck} />
                <KPICard title="Renewal Rate" value={`${data.renewalRate}%`} rawValue={data.renewalRate} isEditing={isEditing} onValueChange={(val) => updateData('renewalRate', val)} icon={Activity} />
                <KPICard title="Client Health Score" value={`${data.healthScore}%`} rawValue={data.healthScore} isEditing={isEditing} onValueChange={(val) => updateData('healthScore', val)} icon={Map} colorClass="text-[#F5A623]" />
              </div>
              <Card className="mt-6">
                <SectionTitle title="Revenue Health Meter" subtitle="Status pencapaian berdasarkan komposisi target" />
                <div className="mb-8"><ProgressBar value={data.current} max={data.target} label={`Pencapaian: ${formatIDR(data.current)} dari ${formatIDR(data.target)}`} color="bg-[#F5A623]" /></div>
                <div className="relative pt-8 pb-4">
                  <div className="absolute top-0 w-full flex justify-between text-xs font-semibold text-slate-500 dark:text-slate-400 px-2"><span>0</span><span>70 Juta</span><span>100 Juta</span><span>120 Juta+</span></div>
                  <div className="h-4 w-full flex rounded-full overflow-hidden shadow-inner">
                    <div className="h-full bg-rose-500 w-[58.3%] relative group"><div className="opacity-0 group-hover:opacity-100 absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs py-1 px-2 rounded whitespace-nowrap transition-opacity z-10">Merah (0-70 Juta)</div></div>
                    <div className="h-full bg-yellow-400 w-[25%] relative group"><div className="opacity-0 group-hover:opacity-100 absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs py-1 px-2 rounded whitespace-nowrap transition-opacity z-10">Kuning (70-100 Juta)</div></div>
                    <div className="h-full bg-emerald-500 w-[16.7%] relative group"><div className="opacity-0 group-hover:opacity-100 absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs py-1 px-2 rounded whitespace-nowrap transition-opacity z-10">Hijau (100-120 Juta)</div></div>
                    <div className="h-full bg-gradient-to-r from-amber-400 to-yellow-600 flex-1 min-w-[20px] relative group"><div className="opacity-0 group-hover:opacity-100 absolute -top-8 right-0 bg-slate-800 text-white text-xs py-1 px-2 rounded whitespace-nowrap transition-opacity z-10">Emas (120 Juta+)</div></div>
                  </div>
                  <div className="absolute top-2 -ml-2 transition-all duration-500" style={{ left: `${Math.min(100, (data.current/data.target)*100)}%` }}>
                    <div className="w-0 h-0 border-l-[8px] border-r-[8px] border-t-[10px] border-l-transparent border-r-transparent border-t-[#0A1F44] dark:border-t-white mx-auto"></div>
                    <div className="w-0.5 h-6 bg-[#0A1F44] dark:bg-white mx-auto"></div>
                  </div>
                </div>
              </Card>
            </div>
          );
        };

        const RevenueDashboardFull = ({ clients, setClients, strategic, setStrategic, project, setProject, isEditing }) => {
          const updateClient = (idx, field, val) => { const updated = [...clients]; updated[idx][field] = val; setClients(updated); };
          const updateStrategic = (idx, field, val) => { const updated = [...strategic]; updated[idx][field] = val; setStrategic(updated); };
          const updateProject = (idx, field, val) => { const updated = [...project]; updated[idx][field] = val; setProject(updated); };
          
          const totalCore = clients.reduce((acc, c) => acc + Number(c.rev || 0), 0);
          
          // Kalkulasi Estimasi dan Realisasi
          const totalStrategicRev = strategic.reduce((acc, s) => acc + Number(s.rev || 0), 0);
          const totalStrategicRealisasi = strategic.reduce((acc, s) => acc + Number(s.realisasi || 0), 0);
          
          const totalProjectRev = project.reduce((acc, p) => acc + Number(p.rev || 0), 0);
          const totalProjectRealisasi = project.reduce((acc, p) => acc + Number(p.realisasi || 0), 0);

          return (
            <div className="space-y-6">
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <Card className="lg:col-span-2">
                  <SectionTitle title="Core Recurring Revenue" subtitle="Pendapatan tetap bulanan / tahunan dari klien aktif" />
                  <div className="space-y-4">
                     {clients.length === 0 && <p className="text-sm text-slate-500 italic py-4">Menunggu data klien...</p>}
                     {clients.filter(c => c.rev >= 0).map((client, i) => (
                        <div key={i} className="flex items-center justify-between">
                          <div className="w-40 font-medium text-sm dark:text-slate-300"><EditableField isEditing={isEditing} value={client.name} onChange={(v) => updateClient(i, 'name', v)} inputClass="w-full" /></div>
                          <div className="flex-1 mx-4 h-3 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden hidden sm:block"><div className="h-full bg-[#0A1F44] rounded-full transition-all" style={{ width: `${Math.min(100, (client.rev / 15000000) * 100)}%` }}></div></div>
                          <div className="w-36 text-right font-bold text-sm dark:text-white"><EditableField isEditing={isEditing} type="number" prefix="Rp " value={client.rev} onChange={(v) => updateClient(i, 'rev', v)} className="" inputClass="w-28 text-right" /></div>
                        </div>
                     ))}
                     <div className="pt-4 mt-4 border-t border-slate-200 dark:border-slate-700">
                        <div className="flex items-center justify-between"><div className="w-32 font-bold text-sm text-[#F5A623]">TOTAL CORE</div><div className="flex-1 mx-4"></div><div className="w-36 text-right font-bold text-sm text-[#F5A623]">{formatIDR(totalCore)}</div></div>
                     </div>
                  </div>
                </Card>
                <div className="space-y-6">
                  <Card className="bg-gradient-to-br from-[#0A1F44] to-[#1a3668] text-white border-none shadow-lg">
                    <h3 className="font-bold text-lg mb-4 text-[#F5A623]">Strategic Revenue</h3>
                    <div className="flex justify-between text-xs text-white/60 mb-2 border-b border-white/20 pb-1">
                      <span className="w-2/5">Klien / Program</span>
                      <span className="w-1/4 text-right">Estimasi</span>
                      <span className="w-1/3 text-right">Realisasi</span>
                    </div>
                    <div className="space-y-3 text-sm">
                      {strategic.length === 0 && <p className="text-xs italic text-white/50">Data belum tersedia...</p>}
                      {strategic.map((item, i) => (
                        <div key={i} className="flex justify-between items-center pb-2 border-b border-white/10 last:border-0">
                          <span className="w-2/5"><EditableField isEditing={isEditing} value={item.name} onChange={(v) => updateStrategic(i, 'name', v)} inputClass="w-full bg-transparent border-white/30 text-white" /></span>
                          <span className="w-1/4 text-right text-white/80"><EditableField isEditing={isEditing} type="number" value={item.rev} onChange={(v) => updateStrategic(i, 'rev', v)} inputClass="w-full bg-transparent border-white/30 text-white text-right" /></span>
                          <span className="font-bold text-[#F5A623] text-right w-1/3"><EditableField isEditing={isEditing} type="number" prefix="Rp" value={item.realisasi} onChange={(v) => updateStrategic(i, 'realisasi', v)} inputClass="w-full bg-transparent border-white/30 text-white text-right" /></span>
                        </div>
                      ))}
                      <div className="pt-2 mt-1 border-t border-white/20">
                        <div className="flex items-center justify-between text-xs mb-1">
                          <span className="text-white/70">Total Estimasi</span>
                          <span className="text-white/70">{formatIDR(totalStrategicRev)}</span>
                        </div>
                        <div className="flex items-center justify-between">
                          <span className="font-bold text-[#F5A623]">TOTAL REALISASI</span>
                          <span className="font-bold text-[#F5A623]">{formatIDR(totalStrategicRealisasi)}</span>
                        </div>
                      </div>
                    </div>
                  </Card>
                  <Card className="shadow-md border-t-4 border-t-[#0A1F44]">
                    <h3 className="font-bold text-lg mb-4 dark:text-white">Project Revenue</h3>
                    <div className="flex justify-between text-xs text-slate-400 mb-2 border-b border-slate-200 dark:border-slate-700 pb-1">
                      <span className="w-2/5">Project</span>
                      <span className="w-1/4 text-right">Estimasi</span>
                      <span className="w-1/3 text-right">Cair Bulan Ini</span>
                    </div>
                    <div className="space-y-3 text-sm">
                      {project.length === 0 && <p className="text-xs italic text-slate-500">Data belum tersedia...</p>}
                      {project.map((item, i) => (
                        <div key={i} className="flex justify-between items-center pb-2 border-b border-slate-100 dark:border-slate-700 last:border-0">
                          <span className="w-2/5 font-medium text-slate-600 dark:text-slate-300"><EditableField isEditing={isEditing} value={item.name} onChange={(v) => updateProject(i, 'name', v)} inputClass="w-full" /></span>
                          <span className="w-1/4 text-right text-slate-500 dark:text-slate-400"><EditableField isEditing={isEditing} type="number" value={item.rev} onChange={(v) => updateProject(i, 'rev', v)} inputClass="w-full text-right" /></span>
                          <span className="font-bold text-[#0A1F44] dark:text-white text-right w-1/3"><EditableField isEditing={isEditing} type="number" prefix="Rp" value={item.realisasi} onChange={(v) => updateProject(i, 'realisasi', v)} inputClass="w-full text-right" /></span>
                        </div>
                      ))}
                      <div className="pt-2 mt-1 border-t border-slate-200 dark:border-slate-600">
                        <div className="flex items-center justify-between text-xs mb-1">
                          <span className="text-slate-500 dark:text-slate-400">Total Estimasi</span>
                          <span className="text-slate-500 dark:text-slate-400">{formatIDR(totalProjectRev)}</span>
                        </div>
                        <div className="flex items-center justify-between">
                          <span className="font-bold text-[#0A1F44] dark:text-white">TOTAL CAIR</span>
                          <span className="font-bold text-[#0A1F44] dark:text-white">{formatIDR(totalProjectRealisasi)}</span>
                        </div>
                      </div>
                    </div>
                  </Card>
                </div>
              </div>
            </div>
          );
        };

        const SalesFunnel = ({ data, setData, isEditing }) => {
          const maxCount = data[0]?.count || 1;
          const updateStage = (index, field, value) => { const newData = [...data]; newData[index][field] = value; newData[index].gap = newData[index].count - newData[index].target; setData(newData); };
          return (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <Card>
                <SectionTitle title="Visual Funnel" subtitle="Konversi tahapan sales pipeline" />
                <div className="flex flex-col items-center w-full py-4 space-y-1">
                  {data.map((step, index) => {
                    const width = Math.max(15, (step.count / maxCount) * 100);
                    const isLast = index === data.length - 1;
                    const bgClass = index < 3 ? 'bg-[#0A1F44]' : index < 5 ? 'bg-[#1a3668]' : 'bg-[#F5A623]';
                    return (
                      <div key={index} className="w-full flex flex-col items-center">
                        <div className={`${bgClass} text-white flex justify-between items-center px-4 py-3 shadow-sm transition-all hover:scale-[1.02]`} style={{ width: `${width}%`, borderTopLeftRadius: index === 0 ? '8px' : '0', borderTopRightRadius: index === 0 ? '8px' : '0', borderBottomLeftRadius: isLast ? '8px' : '4px', borderBottomRightRadius: isLast ? '8px' : '4px', clipPath: isLast ? 'none' : 'polygon(0% 0%, 100% 0%, 95% 100%, 5% 100%)' }}><span className="text-xs md:text-sm font-medium truncate pr-2">{step.stage}</span><span className="font-bold">{step.count}</span></div>
                        {!isLast && <div className="text-xs text-slate-400 my-1 flex items-center"><ArrowDownRight size={12} className="mr-1" /> {data[index + 1].conv}</div>}
                      </div>
                    )
                  })}
                </div>
              </Card>
              <Card>
                 <SectionTitle title="Pipeline Metrics" subtitle="Target vs Actual Gap Analysis" />
                 <div className="overflow-x-auto">
                   <table className="w-full text-sm text-left">
                     <thead className="text-xs text-slate-500 uppercase bg-slate-50 dark:bg-slate-800 dark:text-slate-400"><tr><th className="px-4 py-3 rounded-tl-lg">Stage</th><th className="px-4 py-3">Actual</th><th className="px-4 py-3">Target</th><th className="px-4 py-3 rounded-tr-lg">Gap</th></tr></thead>
                     <tbody>
                       {data.map((row, i) => (
                         <tr key={i} className="border-b dark:border-slate-700 last:border-0 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                           <td className="px-4 py-3 font-medium dark:text-slate-300"><EditableField isEditing={isEditing} value={row.stage} onChange={(v) => updateStage(i, 'stage', v)} /></td>

            const parseNumber = (val) => {
                if (!val) return 0;
                const cleaned = val.toString().replace(/[^0-9-]/g, ""); 
                return Number(cleaned) || 0;
            };

            // FUNGSI FETCH INDEPENDEN: Satu gagal, yang lain tetap jalan.
            const fetchSafely = async (url, sheetName) => {
                try {
                    // Coba jalur utama (Langsung ke Google)
                    const res = await fetch(url);
                    if (res.ok) {
                        const text = await res.text();
                        // Cek apakah Google malah mengirim halaman HTML (Login Screen)
                        if (!text.trim().toLowerCase().startsWith('<!doctype') && !text.trim().toLowerCase().startsWith('<html')) {
                            return { name: sheetName, data: text, error: null };
                        }
                    }
                } catch (e1) {
                    console.log(`Jalur utama ${sheetName} gagal, mencoba proxy alternatif...`);
                }
                
                try {
                    // Jalur Cadangan (Proxy yang ramah CORS)
                    const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                    const resProxy = await fetch(proxyUrl);
                    if (resProxy.ok) {
                        const textProxy = await resProxy.text();
                        if (!textProxy.trim().toLowerCase().startsWith('<!doctype') && !textProxy.trim().toLowerCase().startsWith('<html')) {
                            return { name: sheetName, data: textProxy, error: null };
                        }
                    }
                } catch (e2) {
                    console.log(`Proxy untuk ${sheetName} juga gagal.`);
                }

                // Jika benar-benar gagal
                return { 
                    name: sheetName, 
                    data: "", 
                    error: `Gagal memuat ${sheetName}. Pastikan opsi "Batasi akses untuk organisasi" pada Google Sheets Anda dimatikan.` 
                };
            };

            const fetchSheetData = async () => {
              setIsLoading(true);
              setFetchError(null);
              setFetchWarnings([]);

              const baseUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vREER9VzmeYUpJP9H4UH866bCCE5rtjyCFI1_P6jwVWF9XmY359fFxeeZdRgtDkFBuKsHd_s3Fvm8x4/pub';
              
              const urls = [
                `${baseUrl}?gid=0&output=csv`,           // Tab 1: Core Clients
                `${baseUrl}?gid=172172068&output=csv`,   // Tab 2: Strategic Revenue
                `${baseUrl}?gid=586338828&output=csv`,   // Tab 3: Project Revenue
                `${baseUrl}?gid=506452129&output=csv` // Tab 4: Target KPI (HARAP GANTI GID INI NANTI)
              ];

              try {
                // Menarik KE-EMPAT data secara bersamaan
                const results = await Promise.all([
                    fetchSafely(urls[0], "Core Clients"),
                    fetchSafely(urls[1], "Strategic Revenue"),
                    fetchSafely(urls[2], "Project Revenue"),
                    fetchSafely(urls[3], "Target KPI")
                ]);

                // Mengumpulkan pesan error jika ada sheet yang gagal
                const warnings = results.filter(r => r.error).map(r => r.error);
                if (warnings.length > 0) {
                    setFetchWarnings(warnings);
                    // Jika SEMUANYA gagal, beri alert merah besar
                    if (warnings.length === 4) {
                        throw new Error("Semua koneksi ke Google Sheets diblokir. Harap periksa izin 'Publish to Web' atau nonaktifkan pemblokir iklan (Adblocker/Brave Shields).");
                    }
                }

                // Parser CSV
                const parseCSV = (csv) => {
                  if (!csv) return [];
                  const lines = csv.split(/\r?\n/).filter(line => line.trim());
                  if (lines.length < 2) return [];
                  
                  const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/["']/g, ''));
                  
                  return lines.slice(1).map(line => {
                      const values = [];
                      let inQuotes = false;
                      let currentValue = '';
                      for (let i = 0; i < line.length; i++) {
                          const char = line[i];
                          if (char === '"') inQuotes = !inQuotes;
                          else if (char === ',' && !inQuotes) { values.push(currentValue); currentValue = ''; }
                          else currentValue += char;
                      }
                      values.push(currentValue);
                      const row = {};
                      headers.forEach((header, index) => {
                          row[header] = values[index] ? values[index].replace(/^"|"$/g, '').trim() : '';
                      });
                      return row;
                  });
                };

                // Proses Data secara independen (Hanya yang berhasil di-fetch)
                let coreData = [], stratData = [], projData = [], targetData = null;

                if (results[0].data) {
                    coreData = parseCSV(results[0].data).map(item => ({ 
                        name: item.name || '', rev: parseNumber(item.rev), score: parseNumber(item.score),
                        health: item.health || 'Kuning', renewal: item.renewal || '', action: item.action || '', risk: item.risk || ''
                    }));
                    setClientsData(coreData);
                }
                
                if (results[1].data) {
                    // MENGAMBIL KOLOM REALISASI UNTUK STRATEGIC
                    stratData = parseCSV(results[1].data).map(item => ({ 
                        name: item.name || '', 
                        rev: parseNumber(item.rev), 
                        realisasi: parseNumber(item.realisasi) 
                    }));
                    setStrategicData(stratData);
                }
                
                if (results[2].data) {
                    // MENGAMBIL KOLOM REALISASI UNTUK PROJECT
                    projData = parseCSV(results[2].data).map(item => ({ 
                        name: item.name || '', 
                        rev: parseNumber(item.rev), 
                        realisasi: parseNumber(item.realisasi) 
                    }));
                    setProjectData(projData);
                }

                if (results[3].data) {
                    const parsedTarget = parseCSV(results[3].data);
                    if (parsedTarget.length > 0) {
                        targetData = parsedTarget[0]; // Hanya ambil baris pertama data target
                    }
                }

                // Kalkulasi Total Revenue BERDASARKAN REALISASI
                const totalCoreRev = coreData.reduce((sum, item) => sum + item.rev, 0);
                const totalStratRealisasi = stratData.reduce((sum, item) => sum + (item.realisasi || 0), 0);
                const totalProjRealisasi = projData.reduce((sum, item) => sum + (item.realisasi || 0), 0);

                // Kalkulasi Nilai Rata-rata Health Score
                let avgHealthScore = 80; // Nilai default jika data klien kosong
                if (coreData.length > 0) {
                    const totalScore = coreData.reduce((sum, item) => sum + (item.score || 0), 0);
                    avgHealthScore = Math.round(totalScore / coreData.length);
                }

                // Memperbarui State Executive Summary dengan data kalkulasi dan Target KPI
                setRevenueData(prev => ({
                  ...prev,
                  // CURRENT REVENUE = CORE + REALISASI STRATEGIC + REALISASI PROJECT
                  current: totalCoreRev + totalStratRealisasi + totalProjRealisasi,
                  activeClients: coreData.length,
                  healthScore: avgHealthScore, // Dimasukkan otomatis hasil rata-rata
                  
                  // Jika targetData berhasil diambil dari sheet ke-4, gunakan nilainya, jika tidak gunakan default
                  target: targetData ? parseNumber(targetData.target_revenue) : prev.target,
                  forecast: targetData ? parseNumber(targetData.forecast) : prev.forecast,
                  targetNew: targetData ? parseNumber(targetData.target_new_client) : prev.targetNew,
                  renewalRate: targetData ? parseNumber(targetData.renewal_rate) : prev.renewalRate,
                }));

              } catch (error) {
                console.warn("Fatal Error Sync:", error);
                setFetchError(error.message);
              } finally {
                setIsLoading(false);
              }
            };
            
            fetchSheetData();
          }, []);

          useEffect(() => {
            if (isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [isDarkMode]);

          const menuItems = [
            { name: 'Executive Summary', icon: LayoutDashboard }, { name: 'Revenue Dashboard', icon: DollarSign },
            { name: 'Sales Funnel', icon: Filter }, { name: 'Client Health Score', icon: Activity },
            { name: 'Client Acquisition', icon: Users }, { name: 'Marketing Dashboard', icon: Target },
            { name: 'Roadmap Execution', icon: Map }, { name: 'Team KPI', icon: Briefcase },
            { name: 'Finance Dashboard', icon: BarChart2 },
          ];

          const renderContent = () => {
            switch (activePage) {
              case 'Executive Summary': return <ExecutiveSummary data={revenueData} setData={setRevenueData} isEditing={isEditing} />;
              case 'Sales Funnel': return <SalesFunnel data={funnelData} setData={setFunnelData} isEditing={isEditing} />;
              case 'Revenue Dashboard': return <RevenueDashboardFull clients={clientsData} setClients={setClientsData} strategic={strategicData} setStrategic={setStrategicData} project={projectData} setProject={setProjectData} isEditing={isEditing} />;
              case 'Client Health Score': return <ClientHealthFull clients={clientsData} setClients={setClientsData} isEditing={isEditing} />;
              case 'Client Acquisition': return <ClientAcquisitionFull data={acquisitionData} setData={setAcquisitionData} isEditing={isEditing} />;
              case 'Marketing Dashboard': return <MarketingDashboardFull data={marketingData} setData={setMarketingData} isEditing={isEditing} />;
              case 'Roadmap Execution': return <RoadmapExecutionFull data={roadmapData} setData={setRoadmapData} isEditing={isEditing} />;
              case 'Team KPI': return <TeamKPIFull data={teamKpiData} setData={setTeamKpiData} isEditing={isEditing} />;
              case 'Finance Dashboard': return <FinanceDashboardFull data={financeData} setData={setFinanceData} isEditing={isEditing} />;
              default: return <ExecutiveSummary data={revenueData} setData={setRevenueData} isEditing={isEditing} />;
            }
          };

          return (
            <div className={`min-h-screen font-sans ${isDarkMode ? 'dark bg-slate-900' : 'bg-slate-50'}`}>
              <aside className={`fixed top-0 left-0 z-40 h-screen transition-transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} w-64 bg-[#0A1F44] border-r border-[#1a3668] flex flex-col`}>
                <div className="h-16 flex items-center px-6 border-b border-white/10"><h1 className="text-white font-black text-xl tracking-tight">LAGIKREATIF</h1></div>
                <div className="flex-1 overflow-y-auto py-4 px-3 space-y-1">
                  <p className="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Command Center</p>
                  {menuItems.map((item) => {
                    const Icon = item.icon; const isActive = activePage === item.name;
                    return (
                      <button key={item.name} onClick={() => { setActivePage(item.name); if(window.innerWidth < 1024) setIsSidebarOpen(false); }} className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors ${isActive ? 'bg-[#F5A623] text-white' : 'text-slate-300 hover:bg-white/10 hover:text-white'}`}>
                        <Icon size={18} className="mr-3" /> {item.name}
                      </button>
                    )
                  })}
                </div>
                <div className="p-4 border-t border-white/10">
                  <div className="bg-white/5 rounded-lg p-3 text-center">
                    <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Tagline</p>
                    <p className="text-sm font-semibold text-[#F5A623] mt-1">Protect Revenue<br/>Before Growth</p>
                  </div>
                </div>
              </aside>

              <div className={`${isSidebarOpen ? 'lg:ml-64' : ''} transition-all duration-300 flex flex-col min-h-screen`}>
                <header className="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-4 sticky top-0 z-30">
                  <div className="flex items-center gap-4">
                    <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg lg:hidden"><Menu size={20} /></button>
                    <div className="hidden md:flex items-center gap-3">
                      <h2 className="text-lg font-bold text-[#0A1F44] dark:text-white">{activePage}</h2>
                      <div className="flex items-center text-xs font-semibold bg-slate-50 dark:bg-slate-900 text-[#0A1F44] dark:text-slate-300 px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-700 shadow-sm">
                        <Calendar size={14} className="mr-2 text-[#F5A623]" />
                        {isEditing ? (
                          <input type="text" value={currentPeriod} onChange={(e) => setCurrentPeriod(e.target.value)} className="bg-transparent border-b border-slate-300 dark:border-slate-600 outline-none w-28 focus:border-[#F5A623] dark:focus:border-[#F5A623] px-1 dark:text-white transition-colors" placeholder="Misal: Juni 2026" />
                        ) : (<span>Periode: {currentPeriod}</span>)}
                      </div>
                    </div>
                  </div>
                  <div className="flex items-center gap-2 md:gap-4">
                    <button onClick={() => setIsEditing(!isEditing)} className={`flex items-center gap-1.5 text-xs font-bold px-4 py-2 rounded-md transition-all ${isEditing ? 'bg-emerald-500 text-white shadow-md shadow-emerald-500/30' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 dark:bg-slate-700 dark:text-slate-300 dark:hover:bg-slate-600'}`}>
                      {isEditing ? <Check size={16} /> : <Edit3 size={16} />} {isEditing ? 'Selesai Edit' : 'Edit Data'}
                    </button>
                    <div className="hidden lg:flex items-center gap-2 mx-2 border-r border-slate-200 dark:border-slate-700 pr-4">
                       <button className="flex items-center gap-1 text-xs font-medium text-slate-500 hover:text-[#0A1F44] dark:text-slate-400 dark:hover:text-white bg-slate-100 dark:bg-slate-700 px-3 py-1.5 rounded-md"><Filter size={14} /> Filter</button>
                    </div>
                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700 rounded-full transition-colors">
                      {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
                    </button>
                    <button className="p-2 text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700 rounded-full relative transition-colors hidden sm:block">
                      <Bell size={20} /> <span className="absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full border-2 border-white dark:border-slate-800"></span>
                    </button>
                    <div className="h-8 w-8 rounded-full bg-gradient-to-tr from-[#0A1F44] to-[#F5A623] flex items-center justify-center text-white font-bold text-sm ml-2 shadow-sm">CEO</div>
                  </div>
                </header>

                <div className="bg-[#0A1F44] text-white px-6 py-3 shadow-md flex items-center justify-center text-center">
                   <p className="text-sm md:text-base font-medium italic tracking-wide text-slate-200">"Revenue is not a result of activity. <span className="text-[#F5A623] font-bold">Revenue is a result of the right activity.</span>"</p>
                </div>

                <main className="flex-1 p-4 md:p-6 lg:p-8 w-full max-w-7xl mx-auto">
                  <div className="md:hidden mb-6 flex flex-col gap-3">
                     <div className="flex justify-between items-center"><h2 className="text-xl font-bold text-[#0A1F44] dark:text-white">{activePage}</h2></div>
                     <div className="flex items-center w-max text-xs font-semibold bg-slate-50 dark:bg-slate-900 text-[#0A1F44] dark:text-slate-300 px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-700 shadow-sm">
                        <Calendar size={14} className="mr-2 text-[#F5A623]" />
                        {isEditing ? (
                          <input type="text" value={currentPeriod} onChange={(e) => setCurrentPeriod(e.target.value)} className="bg-transparent border-b border-slate-300 dark:border-slate-600 outline-none w-28 focus:border-[#F5A623] dark:focus:border-[#F5A623] px-1 dark:text-white transition-colors" />
                        ) : (<span>Periode: {currentPeriod}</span>)}
                      </div>
                  </div>
                  
                  {/* Banner Peringatan KETIGA Link Gagal (Warna Merah) */}
                  {fetchError && (
                    <div className="bg-rose-100 border border-rose-400 text-rose-700 px-4 py-3 rounded-lg relative mb-6 flex items-start gap-3 shadow-sm animate-in fade-in">
                      <AlertCircle className="shrink-0 mt-0.5" size={20} />
                      <div>
                        <strong className="font-bold">Gagal menyinkronkan data! </strong>
                        <span className="block sm:inline">{fetchError}</span>
                      </div>
                    </div>
                  )}

                  {/* Banner Peringatan Jika HANYA SEBAGIAN Link yang Gagal (Warna Kuning) */}
                  {!fetchError && fetchWarnings.length > 0 && (
                    <div className="bg-yellow-50 border border-yellow-300 text-yellow-800 px-4 py-3 rounded-lg relative mb-6 flex flex-col sm:flex-row items-start gap-3 shadow-sm animate-in fade-in">
                      <Info className="shrink-0 mt-0.5 text-yellow-600" size={20} />
                      <div className="flex-1">
                        <strong className="font-bold">Beberapa data gagal dimuat:</strong>
                        <ul className="list-disc pl-5 mt-1 text-sm">
                          {fetchWarnings.map((warn, i) => <li key={i}>{warn}</li>)}
                        </ul>
                      </div>
                    </div>
                  )}

                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                    {isLoading ? (
                      <div className="flex flex-col items-center justify-center h-64">
                        <div className="w-12 h-12 border-4 border-slate-200 dark:border-slate-700 border-t-[#F5A623] rounded-full animate-spin"></div>
                        <p className="mt-4 font-semibold text-slate-500 dark:text-slate-400">Menyinkronkan data dari Google Sheets...</p>
                      </div>
                    ) : renderContent()}
                  </div>
                </main>
              </div>
            </div>
          );
        }

        // Jalankan Aplikasi
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
